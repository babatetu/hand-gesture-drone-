[platformio]
default_envs = drone_receiver_esp32

[env:drone_receiver_esp32]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/archive/refs/tags/2.0.14.tar.gz
lib_extra_dirs =
  ../lib
lib_deps =
  nrf24/RF24@^1.4.7
  pololu/VL53L1X @ ^1.3.1
build_flags =
  -D GD1_DRONE_RECEIVER_FIRMWARE=\"GD-1_Drone_Receiver_Refactored\"

